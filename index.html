<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors Arcade</h1>
    <div class="scoreboard">
  <div class="score-block">
    <div class="score-label">PLAYER</div>
    <div class="score-value" id="player-score">00</div>
  </div>

  <div class="score-block">
    <div class="score-label">ROUND</div>
    <div class="score-value" id="round-count">01</div>
  </div>

  <div class="score-block">
    <div class="score-label">CPU</div>
    <div class="score-value" id="cpu-score">00</div>
  </div>
</div>


<div class="arena">

  <div class="fighter">
    <div class="fighter-label">YOU</div>
    <div class="choice-display" id="player-display">❓</div>
  </div>

  <div class="result-text" id="result-text">CHOOSE!</div>

  <div class="fighter">
    <div class="fighter-label">CPU</div>
    <div class="choice-display" id="cpu-display">❓</div>
  </div>

</div>


<div class="controls">
  <button class="choice-btn" id="btn-rock" data-choice="rock">
    🪨 ROCK
  </button>

  <button class="choice-btn" id="btn-paper" data-choice="paper">
    📄 PAPER
  </button>

  <button class="choice-btn" id="btn-scissors" data-choice="scissors">
    ✂️ SCISSORS
  </button>
</div>


<div class="message-log">
  <div class="log-header">BATTLE LOG</div>
  <div class="log-entries" id="log-entries">
    <div class="log-entry">SYSTEM: PRESS A BUTTON TO PLAY.</div>
  </div>
</div>

<button id="reset-btn">⟳ NEW GAME</button>

   <script src="script.js"></script> 
</body>
</html>
